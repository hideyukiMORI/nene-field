openapi: "3.1.0"
info:
  title: NeNe Field API
  version: "0.2.0"
  description: |
    Daily report platform for Japan SMB, built on NENE2.

    **Conventions (binding — see `docs/`):**
    - **Auth:** Bearer JWT on every endpoint except `getHealth` and `login`.
    - **Multi-tenancy (ADR 0013):** the organization is resolved per request
      (subdomain / path / env) into a request-scoped context; every tenanted row
      is scoped by `organization_id`. Bypass routes: `/health`, `/auth/*`,
      `/organizations` (superadmin). The authenticated user's org must match the
      resolved org (else `403`).
    - **Pagination:** list responses use `{ items, limit, offset, total }` with
      `?limit=` (1–100, default 20) and `?offset=` (default 0).
    - **Errors:** RFC 9457 Problem Details (`application/problem+json`); `type` is
      `https://nene-field.dev/problems/{slug}` with slugs from `docs/terms.md §7`.
      `title`/`detail` are English diagnostics — the UI localizes by mapping the
      slug to a message catalog (ADR 0015) and does not display them verbatim.
    - **Identifiers:** JSON is snake_case; identifiers match `docs/terms.md`.
    - **Audit (ADR 0014):** every mutating operation records an `AuditEvent`.
  contact:
    name: hideyukiMORI
    url: https://github.com/hideyukiMORI/nene-field
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:9000
    description: Local development (Tier B Docker; org via env/subdomain — ADR 0013)

tags:
  - name: health
    description: Health check
  - name: auth
    description: Authentication and session
  - name: organizations
    description: Organization provisioning (superadmin) and settings (admin)
  - name: users
    description: User management (admin)
  - name: templates
    description: Report template management (admin)
  - name: reports
    description: Daily report CRUD and lifecycle
  - name: attachments
    description: File attachments on reports
  - name: export
    description: CSV data export
  - name: audit
    description: Audit event log (admin)

security:
  - bearerAuth: []

# ─────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  # ── Reusable parameters ───────────────────
  parameters:
    LimitParam:
      name: limit
      in: query
      description: Page size (1–100).
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetParam:
      name: offset
      in: query
      description: Number of records to skip.
      schema:
        type: integer
        minimum: 0
        default: 0

  # ── Shared schemas ────────────────────────
  schemas:

    # ── Error ──────────────────────────────
    ProblemDetails:
      type: object
      required: [type, title, status]
      properties:
        type:
          type: string
          description: Stable problem identifier; slug from `docs/terms.md §7`.
          example: "https://nene-field.dev/problems/report-not-found"
        title:
          type: string
          description: English summary (UI localizes via the slug — ADR 0015).
          example: "Report Not Found"
        status:
          type: integer
          example: 404
        detail:
          type: string
          description: English diagnostic; never shown verbatim to end users.
        instance:
          type: string
          description: Request-specific URI / identifier.
        errors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'

    ValidationError:
      type: object
      required: [field, message, code]
      properties:
        field:
          type: string
          example: "work_date"
        message:
          type: string
          example: "work_date is required."
        code:
          type: string
          description: Stable machine code (UI maps to `error.validation.{code}`).
          example: "required"

    # ── Health ─────────────────────────────
    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          example: ok
        version:
          type: string
          example: "0.2.0"

    # ── Auth ───────────────────────────────
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      example:
        email: "tanaka@example.com"
        password: "********"

    LoginResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
          description: JWT bearer token (24h default; carries organization_id + role).
        user:
          $ref: '#/components/schemas/UserResponse'

    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password:
          type: string
          format: password
        new_password:
          type: string
          format: password
          minLength: 8

    # ── Organization ───────────────────────
    OrganizationResponse:
      type: object
      required: [organization_id, name, slug, is_active, created_at, updated_at]
      properties:
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
          description: Unique tenant-resolution key (ADR 0013).
        custom_domain:
          type: string
          nullable: true
          description: Unique vanity domain (Tier B; superadmin-managed).
        is_active:
          type: boolean
        ai_summary_enabled:
          type: boolean
        notification_email:
          type: string
          format: email
          nullable: true
        webhook_url:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
      example:
        organization_id: "0a8f...c1"
        name: "山田造園"
        slug: "yamada"
        custom_domain: null
        is_active: true
        ai_summary_enabled: false
        notification_email: "kanri@example.com"
        webhook_url: null
        created_at: "2026-06-01T09:00:00Z"
        updated_at: "2026-06-10T02:30:00Z"

    OrganizationCreateRequest:
      description: Superadmin only — provisions a new tenant.
      type: object
      required: [name, slug]
      properties:
        name:
          type: string
          maxLength: 100
        slug:
          type: string
          maxLength: 100
          pattern: "^[a-z0-9-]+$"
        custom_domain:
          type: string
          nullable: true
        is_active:
          type: boolean
          default: true

    OrganizationUpdateRequest:
      description: |
        Admin updates settings (name, AI, notifications, webhook). `slug`,
        `custom_domain`, and `is_active` are superadmin-only fields.
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        ai_summary_enabled:
          type: boolean
        ai_api_url:
          type: string
          nullable: true
        ai_api_key:
          type: string
          format: password
          nullable: true
          description: Write-only; never returned in any response.
        notification_email:
          type: string
          format: email
          nullable: true
        webhook_url:
          type: string
          nullable: true
        slug:
          type: string
          description: Superadmin only.
        custom_domain:
          type: string
          nullable: true
          description: Superadmin only.
        is_active:
          type: boolean
          description: Superadmin only.

    OrganizationListResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrganizationResponse'
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer

    # ── User ───────────────────────────────
    UserResponse:
      type: object
      required: [user_id, organization_id, name, email, role, is_active, created_at, updated_at]
      properties:
        user_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [submitter, approver, admin, superadmin]
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserCreateRequest:
      type: object
      required: [name, email, role, password]
      properties:
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
        role:
          type: string
          enum: [submitter, approver, admin]
        password:
          type: string
          format: password
          minLength: 8

    UserUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        role:
          type: string
          enum: [submitter, approver, admin]
        is_active:
          type: boolean

    UserListResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserResponse'
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer

    # ── Template ───────────────────────────
    TemplateFieldDefinition:
      type: object
      required: [name, label, type, required]
      properties:
        name:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [text, textarea, number, checkbox, date, select]
        required:
          type: boolean
        options:
          type: array
          items:
            type: string
          description: Options for the `select` type.

    TemplateResponse:
      type: object
      required: [template_id, organization_id, name, fields, is_default, created_at, updated_at]
      properties:
        template_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        fields:
          type: array
          items:
            $ref: '#/components/schemas/TemplateFieldDefinition'
        is_default:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TemplateCreateRequest:
      type: object
      required: [name, fields]
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        fields:
          type: array
          items:
            $ref: '#/components/schemas/TemplateFieldDefinition'
        is_default:
          type: boolean

    TemplateUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 100
        description:
          type: string
          nullable: true
        fields:
          type: array
          items:
            $ref: '#/components/schemas/TemplateFieldDefinition'
        is_default:
          type: boolean

    TemplateListResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TemplateResponse'

    # ── Report ─────────────────────────────
    ReportStatus:
      type: string
      enum: [draft, submitted, approved, rejected]

    AttachmentSummary:
      type: object
      required: [attachment_id, filename, mime_type, file_size, sha256, created_at]
      properties:
        attachment_id:
          type: string
          format: uuid
        filename:
          type: string
        mime_type:
          type: string
          enum: [image/jpeg, image/png, application/pdf]
        file_size:
          type: integer
          description: Bytes.
        sha256:
          type: string
        created_at:
          type: string
          format: date-time

    ReportResponse:
      type: object
      required: [report_id, organization_id, user_id, title, body, work_date, status, created_at, updated_at]
      properties:
        report_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        user_name:
          type: string
        template_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        body:
          type: string
        work_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/ReportStatus'
        tags:
          type: array
          items:
            type: string
        project_code:
          type: string
          nullable: true
        invoice_work_order_id:
          type: string
          nullable: true
        records_entity_id:
          type: string
          nullable: true
        ai_summary:
          type: string
          nullable: true
        ai_tags:
          type: array
          items:
            type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        approved_at:
          type: string
          format: date-time
          nullable: true
        rejected_at:
          type: string
          format: date-time
          nullable: true
        approver_id:
          type: string
          format: uuid
          nullable: true
        approver_comment:
          type: string
          nullable: true
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentSummary'
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ReportSummary:
      description: Condensed report for list views.
      type: object
      required: [report_id, user_id, user_name, title, work_date, status, created_at]
      properties:
        report_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        user_name:
          type: string
        title:
          type: string
        work_date:
          type: string
          format: date
        status:
          $ref: '#/components/schemas/ReportStatus'
        tags:
          type: array
          items:
            type: string
        project_code:
          type: string
          nullable: true
        ai_summary:
          type: string
          nullable: true
        submitted_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ReportCreateRequest:
      type: object
      required: [title, body, work_date]
      properties:
        template_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          maxLength: 200
        body:
          type: string
          maxLength: 10000
        work_date:
          type: string
          format: date
        tags:
          type: array
          items:
            type: string
        project_code:
          type: string
          maxLength: 100
          nullable: true
        invoice_work_order_id:
          type: string
          nullable: true
        records_entity_id:
          type: string
          nullable: true

    ReportUpdateRequest:
      type: object
      properties:
        title:
          type: string
          maxLength: 200
        body:
          type: string
          maxLength: 10000
        work_date:
          type: string
          format: date
        tags:
          type: array
          items:
            type: string
        project_code:
          type: string
          maxLength: 100
          nullable: true
        invoice_work_order_id:
          type: string
          nullable: true
        records_entity_id:
          type: string
          nullable: true

    ApproveRequest:
      type: object
      properties:
        comment:
          type: string
          maxLength: 1000
          nullable: true

    RejectRequest:
      type: object
      required: [comment]
      properties:
        comment:
          type: string
          maxLength: 1000

    ReportListResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ReportSummary'
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer

    # ── Audit ──────────────────────────────
    AuditEventResponse:
      type: object
      required: [event_id, organization_id, entity_type, entity_id, event_name, occurred_at]
      properties:
        event_id:
          type: string
          format: uuid
        organization_id:
          type: string
          format: uuid
        entity_type:
          type: string
          description: "Report / ReportTemplate / ReportAttachment / User / Organization"
        entity_id:
          type: string
          format: uuid
        event_name:
          type: string
          description: "`{entity}.{verb}` from `docs/terms.md §8`."
        actor_id:
          type: string
          format: uuid
          nullable: true
          description: Null for system actions.
        actor_name:
          type: string
          nullable: true
        before:
          type: object
          nullable: true
          description: Sanitized snapshot before the change (null for create); secrets never included.
        after:
          type: object
          nullable: true
          description: Sanitized snapshot after the change (null for delete); secrets never included.
        request_id:
          type: string
          nullable: true
        occurred_at:
          type: string
          format: date-time

    AuditEventListResponse:
      type: object
      required: [items, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AuditEventResponse'
        limit:
          type: integer
        offset:
          type: integer
        total:
          type: integer

  # ── Shared responses (Problem Details) ────
  responses:
    Unauthorized:
      description: Missing or invalid token (`unauthorized`).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: "https://nene-field.dev/problems/unauthorized"
            title: "Unauthorized"
            status: 401
    Forbidden:
      description: Authenticated but not permitted, incl. cross-tenant (`forbidden`).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: "https://nene-field.dev/problems/forbidden"
            title: "Forbidden"
            status: 403
    NotFound:
      description: Resource not found in the caller's organization.
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: "https://nene-field.dev/problems/report-not-found"
            title: "Report Not Found"
            status: 404
    ValidationFailed:
      description: Request validation failure (`validation-failed`).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: "https://nene-field.dev/problems/validation-failed"
            title: "Validation Failed"
            status: 422
            detail: "The request body contains invalid values."
            errors:
              - field: "work_date"
                message: "work_date is required."
                code: "required"
    Conflict:
      description: Invalid lifecycle state transition (`report-not-in-submitted-state` / `report-not-editable`).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: "https://nene-field.dev/problems/report-not-in-submitted-state"
            title: "Report Not In Submitted State"
            status: 409
    PayloadTooLarge:
      description: Attachment exceeds the size limit (5 MB) or per-report file count (5).
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
          example:
            type: "https://nene-field.dev/problems/payload-too-large"
            title: "Payload Too Large"
            status: 413

# ─────────────────────────────────────────────
paths:

  # ── Health ─────────────────────────────────
  /health:
    get:
      operationId: getHealth
      tags: [health]
      summary: Health check
      security: []
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ── Auth ───────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in and obtain a JWT
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationFailed'

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Invalidate the current session
      responses:
        "204":
          description: No Content
        "401":
          $ref: '#/components/responses/Unauthorized'

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get the current authenticated user
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change the current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        "204":
          description: No Content
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationFailed'

  # ── Organizations ──────────────────────────
  /organizations:
    get:
      operationId: listOrganizations
      tags: [organizations]
      summary: List all organizations (superadmin only)
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationListResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createOrganization
      tags: [organizations]
      summary: Provision a new organization (superadmin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationCreateRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "409":
          $ref: '#/components/responses/Conflict'
        "422":
          $ref: '#/components/responses/ValidationFailed'

  /organizations/{organization_id}:
    parameters:
      - name: organization_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getOrganization
      tags: [organizations]
      summary: Get organization settings
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateOrganization
      tags: [organizations]
      summary: Update organization settings (admin; tenant fields superadmin-only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrganizationUpdateRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrganizationResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "422":
          $ref: '#/components/responses/ValidationFailed'

  # ── Users ──────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users in the organization (admin only)
      parameters:
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createUser
      tags: [users]
      summary: Create a user (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
