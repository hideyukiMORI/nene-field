  # ── Reports ────────────────────────────────
  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List reports (submitter sees own; approver/admin see all in org)
      parameters:
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: work_date_from
          in: query
          schema:
            type: string
            format: date
        - name: work_date_to
          in: query
          schema:
            type: string
            format: date
        - name: status
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ReportStatus'
        - name: tags
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: project_code
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
            enum: [work_date_desc, work_date_asc, submitted_at_desc]
            default: work_date_desc
        - $ref: '#/components/parameters/LimitParam'
        - $ref: '#/components/parameters/OffsetParam'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportListResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createReport
      tags: [reports]
      summary: Create a draft report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportCreateRequest'
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "422":
          $ref: '#/components/responses/ValidationFailed'

  /reports/{report_id}:
    parameters:
      - name: report_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getReport
      tags: [reports]
      summary: Get a report by ID (with attachments)
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateReport
      tags: [reports]
      summary: Update a draft or rejected report (submitter only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReportUpdateRequest'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'
        "422":
          $ref: '#/components/responses/ValidationFailed'
    delete:
      operationId: deleteReport
      tags: [reports]
      summary: Delete a draft report (submitter only)
      responses:
        "204":
          description: No Content
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  /reports/{report_id}/submit:
    parameters:
      - name: report_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: submitReport
      tags: [reports]
      summary: Submit a draft report for approval
      responses:
        "200":
          description: OK — report is now `submitted`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  /reports/{report_id}/approve:
    parameters:
      - name: report_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: approveReport
      tags: [reports]
      summary: Approve a submitted report (approver / admin only)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveRequest'
      responses:
        "200":
          description: OK — report is now `approved` (immutable)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  /reports/{report_id}/reject:
    parameters:
      - name: report_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: rejectReport
      tags: [reports]
      summary: Reject a submitted report with a mandatory comment (approver / admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RejectRequest'
      responses:
        "200":
          description: OK — report returns to `draft`
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'
        "422":
          $ref: '#/components/responses/ValidationFailed'

  /reports/{report_id}/summary:
    parameters:
      - name: report_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: regenerateReportSummary
      tags: [reports]
      summary: Regenerate the AI summary (admin only; Phase 3, requires ai_summary_enabled)
      responses:
        "200":
          description: OK — summary regenerated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'
    delete:
      operationId: clearReportSummary
      tags: [reports]
      summary: Clear the AI summary (admin only; Phase 3)
      responses:
        "200":
          description: OK — summary cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'

  # ── Attachments ────────────────────────────
  /reports/{report_id}/attachments:
    parameters:
      - name: report_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    post:
      operationId: uploadAttachment
      tags: [attachments]
      summary: Upload a file attachment (draft / rejected only; max 5 files, 5 MB each)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachmentSummary'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'
        "413":
          $ref: '#/components/responses/PayloadTooLarge'
        "422":
          $ref: '#/components/responses/ValidationFailed'

  /reports/{report_id}/attachments/{attachment_id}:
    parameters:
      - name: report_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: attachment_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: downloadAttachment
      tags: [attachments]
      summary: Download an attachment file (authenticated; SHA-256 verified)
      responses:
        "200":
          description: File content
          content:
            image/jpeg: {}
            image/png: {}
            application/pdf: {}
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteAttachment
      tags: [attachments]
      summary: Delete an attachment (submitter; draft / rejected only)
      responses:
        "204":
          description: No Content
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  # ── Export ─────────────────────────────────
  /export/csv:
    get:
      operationId: exportReportsCsv
      tags: [export]
      summary: Export reports as CSV (admin only; UTF-8 with BOM)
      parameters:
        - name: work_date_from
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: work_date_to
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: project_code
          in: query
          schema:
            type: string
        - name: status
          in: query
          style: form
          explode: true
          schema:
            type: array
            items:
              $ref: '#/components/schemas/ReportStatus'
            default: [approved]
      responses:
        "200":
          description: CSV file
          content:
            text/csv:
              schema:
                type: string
                format: binary
