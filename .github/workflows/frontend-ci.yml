name: Frontend CI

# paths フィルタは意図的に置かない: この check を required にするため、
# backend のみの PR でも必ず実行されて緑になる必要がある（#87）。
# ジョブは約50秒と軽量なので常時実行のコストは許容。
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    # required checks のコンテキスト名。backend-ci.yml の backend-check と
    # 区別するため一意な名前を明示する（job id のままだと両方 "check" で衝突）。
    name: frontend-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # npm run check = type-check + lint + format + test (vitest) + build.
      # Note: the vitest suite had a time-dependent flake history (relativized
      # on 2026-07-07) — if this step fails on an untouched suite, suspect a
      # flake and re-run before changing any test.
      - name: Check (type-check, lint, format, test, build)
        run: npm run check

      - name: Audit (fail on high/critical)
        run: npm audit --audit-level=high
