name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend-ci.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # npm run check = type-check + lint + format + test (vitest) + build.
      # Note: the vitest suite had a time-dependent flake history (relativized
      # on 2026-07-07) — if this step fails on an untouched suite, suspect a
      # flake and re-run before changing any test.
      - name: Check (type-check, lint, format, test, build)
        run: npm run check

      - name: Audit (fail on high/critical)
        run: npm audit --audit-level=high
