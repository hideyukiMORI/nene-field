# NeNe Field — local development stack.
#
#   cp .env.example .env
#   docker compose build
#   docker compose run --rm app composer install
#   docker compose up
#
# Host ports are fixed in the "90 lane" (see README "Local port allocation").
# Every published port is driven by a NENE_FIELD_* variable so collisions with
# sibling NeNe products never happen.
#
# The backend defaults to MySQL here (DB_ADAPTER=mysql / DB_HOST=mysql) so the
# bundled phpMyAdmin and a production-like schema are usable out of the box. The
# repository's .env default stays SQLite (Tier A); these environment entries take
# precedence because ConfigLoader loads .env immutably (real env vars win).

services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    ports:
      - "${NENE_FIELD_PORT:-9000}:80"
    environment:
      DB_ADAPTER: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: nene_field
      DB_USER: nene_field
      DB_PASSWORD: nene_field
      DB_CHARSET: utf8mb4
      # Resolve to the org created by `composer migrations:seed` (DevSeeder) so a
      # fresh stack can log in immediately as admin@example.com / password.
      NENE_FIELD_TENANT_RESOLUTION: single
      NENE_FIELD_ORG_SLUG: demo
      # Pass-through opt-in for the framework's dev JWT secret (see .env.example).
      # Defaults to empty, so production hosts that omit this var stay fail-closed.
      NENE2_ALLOW_DEV_SECRET: ${NENE2_ALLOW_DEV_SECRET:-}
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    ports:
      - "${NENE_FIELD_MYSQL_PORT:-3309}:3306"
    environment:
      MYSQL_DATABASE: nene_field
      MYSQL_USER: nene_field
      MYSQL_PASSWORD: nene_field
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 12

  phpmyadmin:
    image: phpmyadmin:5
    ports:
      - "${NENE_FIELD_PHPMYADMIN_PORT:-9001}:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: "3306"
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    # Install inside the container so platform-native binaries (esbuild/rollup)
    # match Linux even when the host is macOS/Windows. The named volume below
    # keeps these out of the bind-mounted host tree.
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5190"
    ports:
      - "${NENE_FIELD_FRONTEND_PORT:-5190}:5190"
    environment:
      # Proxy API paths to the backend container instead of 127.0.0.1 (vite.config.ts).
      VITE_API_TARGET: http://app
      # File watching over a bind mount on WSL2/Docker Desktop needs polling.
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - .:/app
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - app

volumes:
  mysql_data:
  frontend_node_modules:
